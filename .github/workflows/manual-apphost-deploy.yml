name: Manual App Host Deploy

run-name: Deploy app-host from ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: manual-apphost-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: antongavrilov88
  IMAGE_TAG: ${{ github.sha }}
  APP_HOST_PORT: ${{ vars.APP_HOST_PORT || '22' }}
  APP_HOST_DEPLOY_DIR: ${{ vars.APP_HOST_DEPLOY_DIR || '/opt/vpn' }}

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: deploy/Dockerfile.api
            image_name: vpn-backend-api
          - service: bot
            dockerfile: deploy/Dockerfile.bot
            image_name: vpn-backend-bot
          - service: migrate
            dockerfile: deploy/Dockerfile.migrate
            image_name: vpn-backend-migrate

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to app-host
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_HOST_SSH_KEY: ${{ secrets.APP_HOST_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"

          printf '%s\n' "${APP_HOST_SSH_KEY}" > "${HOME}/.ssh/app_host_key"
          chmod 600 "${HOME}/.ssh/app_host_key"

          ssh-keyscan -p "${APP_HOST_PORT}" -H "${APP_HOST}" >> "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Upload compose file to app-host
        env:
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_HOST_USER: ${{ secrets.APP_HOST_USER }}
        run: |
          set -euo pipefail

          ssh -p "${APP_HOST_PORT}" -i "${HOME}/.ssh/app_host_key" "${APP_HOST_USER}@${APP_HOST}" \
            "mkdir -p '${APP_HOST_DEPLOY_DIR}'"

          scp -P "${APP_HOST_PORT}" -i "${HOME}/.ssh/app_host_key" \
            deploy/docker-compose.apphost.yml \
            "${APP_HOST_USER}@${APP_HOST}:${APP_HOST_DEPLOY_DIR}/docker-compose.yml"

      - name: Pull, migrate, and restart services
        env:
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_HOST_USER: ${{ secrets.APP_HOST_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ssh -p "${APP_HOST_PORT}" -i "${HOME}/.ssh/app_host_key" \
            "${APP_HOST_USER}@${APP_HOST}" \
            env APP_IMAGE_TAG="${IMAGE_TAG}" \
                APP_HOST_DEPLOY_DIR="${APP_HOST_DEPLOY_DIR}" \
                GHCR_USERNAME="${GHCR_USERNAME}" \
                GHCR_TOKEN="${GHCR_TOKEN}" \
                bash -se <<'EOF'
          set -euo pipefail

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          docker compose -f "${APP_HOST_DEPLOY_DIR}/docker-compose.yml" pull migrate api bot
          docker compose -f "${APP_HOST_DEPLOY_DIR}/docker-compose.yml" --profile tools run --rm migrate
          docker compose -f "${APP_HOST_DEPLOY_DIR}/docker-compose.yml" up -d api bot
          docker logout ghcr.io || true
          EOF

      - name: Deployment summary
        run: |
          {
            echo "### App-host deploy complete"
            echo
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Registry namespace: \`${REGISTRY}/${IMAGE_NAMESPACE}\`"
            echo "- Deploy dir: \`${APP_HOST_DEPLOY_DIR}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
